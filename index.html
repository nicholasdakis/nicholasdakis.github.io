<!DOCTYPE html>
<html lang="en">
<head>

  <!-- ==================== META ==================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-adsense-account" content="ca-pub-4003172698560190">
  <title>Nicholas Dakis</title>

  <!-- ==================== FONTS ==================== -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono&display=swap" rel="stylesheet">

  <!-- ==================== STYLES ==================== -->
  <style>

    /* --- reset & base --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #2a2a2a;
      --accent: #5a5af0;
      --text: #e8e8e8;
      --muted: #666666;
      --border: rgba(255,255,255,0.08);
      --glass: rgba(255,255,255,0.05);
      --font: 'Space Grotesk', sans-serif;
      --mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* --- layout --- */
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    /* --- hero --- */
    .hero {
      margin-bottom: 80px;
    }

    .hero h1 {
      font-size: clamp(42px, 9vw, 72px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.0;
      margin-bottom: 32px;
    }

    /* --- social links --- */
    .links { display: flex; gap: 12px; }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 100px;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.05em;
    }

    .link-btn:hover {
      color: var(--accent);
      border-color: rgba(90,90,240,0.3);
    }

    /* --- section --- */
    .section { margin-bottom: 24px; }

    .section-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* --- project card --- */
    .project-card {
      display: block;
      padding: 32px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: border-color 0.2s;
    }

    .project-card:hover { border-color: rgba(90,90,240,0.3); }
    .project-card:hover .arrow { color: var(--accent); transform: translateX(4px); }

    .project-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .project-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .arrow {
      color: var(--muted);
      font-size: 20px;
      transition: color 0.2s, transform 0.2s;
    }

    .project-desc {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
      max-width: 480px;
    }

    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 100px;
      margin-right: 6px;
      letter-spacing: 0.06em;
    }

    /* --- footer --- */
    .footer {
      margin-top: 80px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* --- responsive --- */
    @media (max-width: 480px) {
      .wrap { padding: 40px 16px; }
      .links { flex-direction: column; }
    }

  </style>
</head>
<body>

<div class="wrap">

  <!-- ==================== HERO ==================== -->
  <header class="hero">
    <h1>Nicholas Dakis</h1>

    <!-- social links -->
    <div class="links">
      <a href="https://github.com/nicholasdakis" target="_blank" class="link-btn">↗ GitHub</a>
      <a href="https://linkedin.com/in/nicholasdakis" target="_blank" class="link-btn">↗ LinkedIn</a>
    </div>
  </header>

  <!-- ==================== PROJECTS ==================== -->
  <section class="section">
    <div class="section-label">Projects</div>

    <!-- level up -->
    <a href="/level_up" class="project-card">
      <div class="project-top">
        <div class="project-name">Level Up!</div>
        <div class="arrow">→</div>
      </div>
      <p class="project-desc">A gamified productivity app that turns your habits and goals into an RPG experience. iOS, Android, and web.</p>
      <span class="tag">Flutter</span>
      <span class="tag">Firebase</span>
      <span class="tag">iOS</span>
      <span class="tag">Android</span>
      <span class="tag">Web</span>
    </a>

  </section>

  <!-- ==================== FOOTER ==================== -->
  <footer class="footer">
    &copy; 2026 Nicholas Dakis
  </footer>

</div>

</body>
</html>
